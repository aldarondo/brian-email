name: Build brian-email image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - src/**
      - package*.json
  schedule:
    - cron: "0 8 * * 0"   # Sundays at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/brian-email:latest
            ghcr.io/${{ github.repository_owner }}/brian-email:${{ github.sha }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb && sudo apt-get install -y sshpass

      - name: Deploy to NAS
        env:
          NAS_PASS: ${{ secrets.NAS_SSH_PASSWORD }}
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family" \
            charles@nas-ssh.aldarondo.family \
            "echo \"$NAS_PASS\" | sudo -S sed -i 's|^GMAIL_USER=.*|GMAIL_USER=$GMAIL_USER|' /volume1/docker/brian-email/.env && \
             echo \"$NAS_PASS\" | sudo -S sed -i 's|^GMAIL_APP_PASSWORD=.*|GMAIL_APP_PASSWORD=$GMAIL_APP_PASSWORD|' /volume1/docker/brian-email/.env && \
             echo \"$NAS_PASS\" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/brian-email/docker-compose.yml pull && \
             echo \"$NAS_PASS\" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/brian-email/docker-compose.yml up -d"
