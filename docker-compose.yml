services:
  brian-email:
    image: ghcr.io/aldarondo/brian-email:latest
    container_name: brian-email
    restart: unless-stopped
    environment:
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - GMAIL_FROM_NAME=${GMAIL_FROM_NAME:-Brian}
      - PORT=${PORT:-8768}
      - EMAIL_RATE_LIMIT_PER_HOUR=${EMAIL_RATE_LIMIT_PER_HOUR:-20}
      - GMAIL_OAUTH_CLIENT_ID=${GMAIL_OAUTH_CLIENT_ID:-}
      - GMAIL_OAUTH_CLIENT_SECRET=${GMAIL_OAUTH_CLIENT_SECRET:-}
      - GMAIL_OAUTH_REFRESH_TOKEN=${GMAIL_OAUTH_REFRESH_TOKEN:-}
      - LOG_FILE=/logs/brian-email.log
      - LOG_MAX_SIZE_MB=${LOG_MAX_SIZE_MB:-10}
      - LOG_MAX_FILES=${LOG_MAX_FILES:-5}
    volumes:
      - ./logs:/logs
    command: node src/serve.js
    network_mode: host
